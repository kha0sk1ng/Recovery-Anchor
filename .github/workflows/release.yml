name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build zip artifact
        id: build
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          OUTPUT="RecoveryAnchor-${VERSION}.zip"
          rm -f "$OUTPUT"
          zip -r "$OUTPUT" \
            module.prop \
            service.sh \
            customize.sh \
            META-INF \
            LICENSE \
            --exclude "*.git*" \
            --exclude "build.sh" \
            --exclude "*.zip" \
            --exclude "*.img" \
            --exclude "*.log"
          SIZE=$(du -sh "$OUTPUT" | cut -f1)
          SHA256=$(sha256sum "$OUTPUT" | cut -d' ' -f1)
          echo "OUTPUT=$OUTPUT"         >> "$GITHUB_OUTPUT"
          echo "SIZE=$SIZE"             >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA256"         >> "$GITHUB_OUTPUT"
          echo "Built $OUTPUT ($SIZE) — sha256: $SHA256"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract the block between ## [VERSION] and the next ## [
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to avoid shell escaping issues with multiline
          printf '%s' "$BODY" > release_body.md

      - name: Append artifact info to release body
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.build.outputs.SHA256 }}"
          SIZE="${{ steps.build.outputs.SIZE }}"
          OUTPUT="${{ steps.build.outputs.OUTPUT }}"
          cat >> release_body.md << EOF

          ---

          ### 📦 Artifact

          | File | Size | SHA-256 |
          |---|---|---|
          | \`${OUTPUT}\` | ${SIZE} | \`${SHA256}\` |

          **Verify before flashing:**
          \`\`\`bash
          sha256sum RecoveryAnchor-${VERSION}.zip
          \`\`\`

          ---

          **Install:** Flash via KernelSU / Magisk → Modules → Install from storage.
          Read [Usage After OTA](https://github.com/${{ github.repository }}#-usage-after-ota-update) before rebooting after any system update.
          EOF

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "RecoveryAnchor ${{ steps.version.outputs.VERSION }}"
          body_path: release_body.md
          draft: true
          prerelease: false
          files: ${{ steps.build.outputs.OUTPUT }}
