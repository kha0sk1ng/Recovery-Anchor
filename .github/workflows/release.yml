name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build zip artifact
        id: build
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          OUTPUT="RecoveryAnchor-${VERSION}.zip"
          rm -f "$OUTPUT"
          zip -r "$OUTPUT" \
            module.prop \
            service.sh \
            customize.sh \
            META-INF \
            LICENSE \
            --exclude "*.git*" \
            --exclude "build.sh" \
            --exclude "*.zip" \
            --exclude "*.img" \
            --exclude "*.log"
          SIZE=$(ls -lh "$OUTPUT" | awk '{print $5}')
          SHA256=$(sha256sum "$OUTPUT" | cut -d' ' -f1)
          echo "OUTPUT=$OUTPUT"         >> "$GITHUB_OUTPUT"
          echo "SIZE=$SIZE"             >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA256"         >> "$GITHUB_OUTPUT"
          echo "Built $OUTPUT ($SIZE) — sha256: $SHA256"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract the block between ## [VERSION] and the next ## [
          BODY=$(awk "/^## \\[${VERSION}\]/{found=1; next} found && /^## \\[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to avoid shell escaping issues with multiline
          printf '%s' "$BODY" > release_body.md

      - name: Append artifact info to release body
        run: |
          printf '\n---\n\n### 📦 Artifact\n\n| File | Size | SHA-256 |\n|---|---|---|\n| `%s` | %s | `%s` |\n\n**Verify before flashing:**\n```bash\nsha256sum %s\n```\n\n---\n\n**Install:** Flash via KernelSU / Magisk → Modules → Install from storage.\nRead [Usage After OTA](https://github.com/${{ github.repository }}#-usage-after-ota-update) before rebooting after any system update.\n' \
            "${{ steps.build.outputs.OUTPUT }}" \
            "${{ steps.build.outputs.SIZE }}" \
            "${{ steps.build.outputs.SHA256 }}" \
            "${{ steps.build.outputs.OUTPUT }}" >> release_body.md

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          OUTPUT="${{ steps.build.outputs.OUTPUT }}"

          # Delete old draft release (if re-running same tag) but keep the tag
          gh release delete "$VERSION" --yes --no-cleanup-tag 2>/dev/null || true

          gh release create "$VERSION" \
            --title "RecoveryAnchor ${VERSION}" \
            --notes-file release_body.md \
            --draft \
            "$OUTPUT"